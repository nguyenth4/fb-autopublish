name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY:     ghcr.io
  IMAGE_WEB:    ghcr.io/${{ github.repository }}/web
  IMAGE_WORKER: ghcr.io/${{ github.repository }}/worker

jobs:

  # ── Job 1: Type check ────────────────────────────────────────────────────────
  test:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec tsc --noEmit
      - run: pnpm --filter worker exec tsc --noEmit

  # ── Job 2: Build & push images ───────────────────────────────────────────────
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta-web.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_WEB }}:main
          cache-to: type=inline

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:main
            ${{ env.IMAGE_WORKER }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_WORKER }}:main
          cache-to: type=inline

  # ── Job 3: Deploy to VPS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + nginx files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source:   "docker-compose.yml,docker/,nginx/"
          target:   "/opt/fb-autopublish/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/fb-autopublish

            echo "==> Login GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling latest images..."
            docker compose pull

            echo "==> Deploying web + worker..."
            docker compose up -d --no-deps --remove-orphans web worker

            echo "==> Waiting for healthcheck..."
            timeout 60 bash -c \
              'until docker compose ps web | grep -q "healthy"; do sleep 2; done'

            echo "==> Pruning old images..."
            docker image prune -f --filter "until=24h"

            echo "==> Deploy complete!"
            docker compose ps
